name: 'Setup PHP + Node'
description: 'Setup PHP and Node.js with caching, Fontawesome and Packagist auth'

inputs:
  npm_fontawesome_auth_token:
    required: true
  packagist_github_token:
    required: true

runs:
  using: 'composite'
  steps:
    - name: Setup Node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version-file: .nvmrc
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    - name: Authenticate with Fontawesome NPM repository
      shell: bash
      env:
        FONTAWESOME_TOKEN: ${{ inputs.npm_fontawesome_auth_token }}
      run: |
        npm config set "//npm.fontawesome.com/:_authToken" "$FONTAWESOME_TOKEN"

    - name: Read PHP version from composer.json to env
      shell: bash
      run: |
        echo "PHP_VERSION=$(cat ./composer.json | jq -r '.config.platform.php')" >> "$GITHUB_ENV"

    - name: Setup PHP
      uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2.37.0
      with:
        php-version: ${{ env.PHP_VERSION }}
      env:
        COMPOSER_TOKEN: ${{ inputs.packagist_github_token }}

    - name: Get Composer Cache Directory
      id: composer-cache
      shell: bash
      run: |
        echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - name: Composer Cache
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-
