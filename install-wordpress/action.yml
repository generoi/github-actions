name: 'Install WordPress'
description: 'Start MySQL, launch WP dev server, and install WordPress (single or multisite)'

inputs:
  multisite:
    required: false
    default: 'false'
  activate_plugins:
    description: 'Space-separated list of plugins to activate after install (e.g. "advanced-custom-fields polylang-pro")'
    required: false
    default: ''
  redis:
    description: 'Start a Redis server and configure WP_REDIS_HOST in .env'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Start Redis
      if: ${{ inputs.redis == 'true' }}
      uses: shogo82148/actions-setup-redis@v1

    - name: Start MySQL service
      shell: bash
      run: |
        sudo /etc/init.d/mysql start
        mysql -e 'CREATE DATABASE db;' -uroot -proot
        mysql -e "CREATE USER 'db'@'localhost' IDENTIFIED BY 'db';" -uroot -proot
        mysql -e "GRANT ALL PRIVILEGES ON db.* TO 'db'@'localhost' WITH GRANT OPTION;" -uroot -proot

    - name: Launch web server
      shell: bash
      run: ./vendor/bin/wp server &

    - name: Setup .env
      shell: bash
      run: |
        cp .env.example .env
        sed -i 's/.*WP_HOME=.*/WP_HOME=http:\/\/localhost:8080/g' .env
        sed -i 's/.*DOMAIN_CURRENT_SITE=.*/DOMAIN_CURRENT_SITE=localhost:8080/g' .env
        sed -i 's/.*DB_HOST=.*/DB_HOST=localhost/g' .env
        if [ "${{ inputs.redis }}" = "true" ]; then
          sed -i 's/.*WP_REDIS_HOST=.*/WP_REDIS_HOST=127.0.0.1/g' .env
        fi

    - name: Install WordPress
      if: ${{ inputs.multisite != 'true' }}
      shell: bash
      run: |
        ./vendor/bin/wp core install \
          --url=http://localhost:8080 \
          --title="Bedrock" \
          --admin_user="admin" \
          --admin_email="bedrock@example.test" \
          --skip-email

    - name: Install WordPress (multisite)
      if: ${{ inputs.multisite == 'true' }}
      shell: bash
      run: |
        ./vendor/bin/wp core multisite-install \
          --url=http://localhost:8080 \
          --title="Bedrock" \
          --admin_email="bedrock@example.test" \
          --skip-config \
          --skip-email

    - name: Activate plugins
      if: ${{ inputs.activate_plugins != '' }}
      shell: bash
      env:
        PLUGINS: ${{ inputs.activate_plugins }}
      run: ./vendor/bin/wp plugin activate $PLUGINS
