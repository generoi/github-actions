name: 'Composer Update Packages'
description: 'Update specific Composer packages and create a PR. Tries composer update first (within constraints), then composer require (bumps constraints) if needed.'

inputs:
  packages:
    required: true
    description: 'Space-separated list of Composer package names to update'
  token:
    required: false
    default: ''
    description: 'GitHub token with push + PR permissions. Defaults to github.token. Pass a GitHub App token for cross-repo write access.'
  pr_title:
    required: false
    default: 'Update packages'
    description: 'PR title'
  pr_body:
    required: false
    default: ''
    description: 'PR body (markdown)'
  pr_label:
    required: false
    default: 'dependencies'
    description: 'Label for the PR (used for dedup)'
  branch_prefix:
    required: false
    default: 'fix/update'
    description: 'Branch name prefix'
  vulns_json:
    required: false
    default: ''
    description: |
      Optional JSON array of vulnerability records (one per package) with at
      least `{package, affected}` fields — i.e. the shape produced by parsing
      `composer audit --format=json`. When set, the action derives a tight
      `~min_safe.minor.0` constraint per package from each record's
      `affected` range and passes `pkg:constraint` to composer's update and
      require calls. This caps bumps at patch-level within the safe-version
      minor, preventing the common over-bump where a CVE patched in 10.5.3
      would otherwise let composer jump to 10.7.0 inside an existing `^10.x`
      constraint. Packages with no parseable upper bound fall through to the
      unconstrained behavior.

outputs:
  pr_url:
    description: 'URL of the open PR — newly created, or the existing one refreshed/deduped. Empty if no PR was opened or touched.'
    value: ${{ steps.create.outputs.pr_url || steps.check.outputs.pr_url }}
  outcome:
    description: 'What happened: created | refreshed | skipped | none. Lets callers suppress redundant notifications when nothing changed (skipped).'
    value: ${{ steps.create.outputs.outcome || steps.check.outputs.outcome }}

runs:
  using: 'composite'
  steps:
    - name: Resolve existing PR (dedup)
      id: check
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token || github.token }}
        PR_BODY: ${{ inputs.pr_body }}
      run: |
        # One rolling PR per label. Decide create / skip / update by comparing
        # the `<!-- <label>-set: a,b,c -->` marker in PR_BODY against the same
        # marker in the open PR's body:
        #   create — no open PR             → "Open or refresh PR" makes one
        #   skip   — open PR has this set   → do nothing (findings unchanged)
        #   update — open PR, set changed   → refresh that PR in place
        # The refresh rewrites the PR body (so the marker tracks the latest
        # findings); that's what makes an unchanged set hit `skip` the next run
        # instead of re-commenting daily. Decision logic lives in lib.sh so it
        # is unit-tested (see tests/lib-functions.test.sh).
        source "$GITHUB_ACTION_PATH/scripts/lib.sh"
        MARKER_KEY="${{ inputs.pr_label }}-set"
        NEW_SET=$(extract_pr_set "$PR_BODY" "$MARKER_KEY")

        EXISTING=$(gh pr list --label "${{ inputs.pr_label }}" --state open --limit 1 --json number,url,headRefName,body)
        EXISTING_NUM=$(echo "$EXISTING" | jq -r '.[0].number // empty')

        if [ -z "$EXISTING_NUM" ]; then
          MODE=$(decide_pr_action false "$NEW_SET" "")
          echo "No open PR with label '${{ inputs.pr_label }}' — mode=$MODE"
        else
          EXISTING_URL=$(echo "$EXISTING" | jq -r '.[0].url // empty')
          EXISTING_HEAD=$(echo "$EXISTING" | jq -r '.[0].headRefName // empty')
          EXISTING_BODY=$(echo "$EXISTING" | jq -r '.[0].body // ""')
          EXISTING_SET=$(extract_pr_set "$EXISTING_BODY" "$MARKER_KEY")
          MODE=$(decide_pr_action true "$NEW_SET" "$EXISTING_SET")
          echo "pr_url=$EXISTING_URL" >> "$GITHUB_OUTPUT"
          echo "existing_num=$EXISTING_NUM" >> "$GITHUB_OUTPUT"
          echo "existing_head=$EXISTING_HEAD" >> "$GITHUB_OUTPUT"
          echo "Open PR #$EXISTING_NUM | existing set: ${EXISTING_SET:-<none>} | new set: ${NEW_SET:-<none>} | mode=$MODE"
        fi
        echo "mode=$MODE" >> "$GITHUB_OUTPUT"
        # skip is terminal here (the create step won't run), so record the
        # outcome now; create/update outcomes are set by "Open or refresh PR".
        if [ "$MODE" = "skip" ]; then
          echo "outcome=skipped" >> "$GITHUB_OUTPUT"
        fi

    - name: Update packages
      if: steps.check.outputs.mode != 'skip'
      id: update
      shell: bash
      env:
        VULNS_JSON: ${{ inputs.vulns_json }}
        PACKAGES: ${{ inputs.packages }}
      run: bash "$GITHUB_ACTION_PATH/scripts/update.sh"

    - name: Open or refresh PR
      if: steps.check.outputs.mode != 'skip'
      id: create
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token || github.token }}
        PR_BODY: ${{ inputs.pr_body }}
        PR_TITLE: ${{ inputs.pr_title }}
        PR_LABEL: ${{ inputs.pr_label }}
        BRANCH_PREFIX: ${{ inputs.branch_prefix }}
        PACKAGES: ${{ inputs.packages }}
        MODE: ${{ steps.check.outputs.mode }}
        CHANGED: ${{ steps.update.outputs.changed }}
        EXISTING_NUM: ${{ steps.check.outputs.existing_num }}
        EXISTING_HEAD: ${{ steps.check.outputs.existing_head }}
        EXISTING_URL: ${{ steps.check.outputs.pr_url }}
        REPO: ${{ github.repository }}
        SERVER_URL: ${{ github.server_url }}
        RUN_NUMBER: ${{ github.run_number }}
        RUN_ID: ${{ github.run_id }}
      run: bash "$GITHUB_ACTION_PATH/scripts/open-or-refresh-pr.sh"
