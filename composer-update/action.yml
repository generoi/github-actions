name: 'Composer Update Packages'
description: 'Update specific Composer packages and create a PR. Tries composer update first (within constraints), then composer require (bumps constraints) if needed.'

inputs:
  packages:
    required: true
    description: 'Space-separated list of Composer package names to update'
  token:
    required: false
    default: ''
    description: 'GitHub token with push + PR permissions. Defaults to github.token. Pass a GitHub App token for cross-repo write access.'
  pr_title:
    required: false
    default: 'Update packages'
    description: 'PR title'
  pr_body:
    required: false
    default: ''
    description: 'PR body (markdown)'
  pr_label:
    required: false
    default: 'dependencies'
    description: 'Label for the PR (used for dedup)'
  branch_prefix:
    required: false
    default: 'fix/update'
    description: 'Branch name prefix'

outputs:
  pr_url:
    description: 'URL of the open PR — newly created, or the existing one hit by dedup. Empty if no PR was opened or touched.'
    value: ${{ steps.create.outputs.pr_url || steps.check.outputs.pr_url }}

runs:
  using: 'composite'
  steps:
    - name: Check for existing PR (dedup)
      id: check
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token || github.token }}
        PR_BODY: ${{ inputs.pr_body }}
      run: |
        # Dedup by label. If an open PR with this label exists we skip creating
        # a duplicate. To avoid silently dropping NEW findings while a stale PR
        # sits open, we compare the marker in PR_BODY (e.g. `<!-- vuln-update-set:
        # foo,bar -->`) to the same marker in the open PR's body — if the package
        # set differs, post a comment so reviewers see the new findings.
        EXISTING=$(gh pr list --label "${{ inputs.pr_label }}" --state open --limit 1 --json number,url,body)
        EXISTING_NUM=$(echo "$EXISTING" | jq -r '.[0].number // empty')

        if [ -z "$EXISTING_NUM" ]; then
          echo "No open PR with label '${{ inputs.pr_label }}' — will create one"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Expose the existing PR URL so callers can link to it even on silent dedup.
        EXISTING_URL=$(echo "$EXISTING" | jq -r '.[0].url // empty')
        echo "pr_url=$EXISTING_URL" >> "$GITHUB_OUTPUT"

        echo "Open PR #$EXISTING_NUM with label '${{ inputs.pr_label }}' exists — checking if findings differ"
        EXISTING_BODY=$(echo "$EXISTING" | jq -r '.[0].body // ""')

        # Extract `<!-- ${LABEL}-set: a,b,c -->` marker from both bodies.
        # If markers match (or both empty), the findings are identical — skip silently.
        MARKER_KEY="${{ inputs.pr_label }}-set"
        EXISTING_SET=$(printf '%s' "$EXISTING_BODY" | grep -oE "$MARKER_KEY: [^ ]+ -->" | head -1 | sed -E "s/.*${MARKER_KEY}: ([^ ]+) -->.*/\1/")
        NEW_SET=$(printf '%s' "$PR_BODY" | grep -oE "$MARKER_KEY: [^ ]+ -->" | head -1 | sed -E "s/.*${MARKER_KEY}: ([^ ]+) -->.*/\1/")

        echo "Existing set: ${EXISTING_SET:-<none>}"
        echo "New set:      ${NEW_SET:-<none>}"

        if [ -n "$NEW_SET" ] && [ "$NEW_SET" = "$EXISTING_SET" ]; then
          echo "Findings unchanged since PR #$EXISTING_NUM was opened — skipping silently"
        else
          echo "Findings differ — posting comment to PR #$EXISTING_NUM"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            printf '## Updated findings — [run #%s](%s)\n\n' "${{ github.run_number }}" "$RUN_URL"
            printf '%s\n' "$PR_BODY"
          } > /tmp/composer-update-comment.md
          gh pr comment "$EXISTING_NUM" --body-file /tmp/composer-update-comment.md
        fi
        echo "skip=true" >> "$GITHUB_OUTPUT"

    - name: Update packages
      if: steps.check.outputs.skip != 'true'
      id: update
      shell: bash
      run: |
        # Snapshot composer.lock to a tempfile BEFORE any composer ops run,
        # so we have an untouched copy for the before/after version diff.
        cp composer.lock /tmp/composer-update-before.lock

        # Step 1: Try composer update (stays within existing constraints).
        # `-W` (--with-all-dependencies) lets composer also update packages that
        # are LOCKED (not just those listed) when needed — required for cases
        # like roots/wordpress-no-content, which is pinned to the same version
        # as roots/wordpress; without -W neither can move.
        # Composite actions run with `set -e`, so capture the exit code via
        # `|| UPDATE_EXIT=$?` to keep the fallback alive on a non-zero exit.
        echo "Trying: composer update -W ${{ inputs.packages }}"
        UPDATE_EXIT=0
        composer update -W ${{ inputs.packages }} --no-interaction --no-scripts 2>&1 || UPDATE_EXIT=$?
        if [ "$UPDATE_EXIT" -ne 0 ]; then
          echo "::warning::composer update exited with code $UPDATE_EXIT, falling through to composer require"
        fi

        if ! git diff --quiet composer.json composer.lock; then
          echo "Updated within existing constraints"
          echo "changed=true" >> "$GITHUB_OUTPUT"
        else
          # Step 2: Constraints blocked the update — try composer require
          # (bumps to latest, REPLACING the existing constraint). Same `-W`
          # reasoning applies.
          #
          # Opt-out: packages listed under `extra.vuln-scan.no-widen` in the
          # project's composer.json are skipped here. Use this for packages
          # whose constraints are intentional (exact pin like "10.0.2", a
          # locked-down range like "^1.1" the team won't widen automatically,
          # license-tested version, etc.). The map's values are free-text
          # reasons — they're not parsed by this action, they exist purely
          # for in-place documentation of why each package opts out.
          #
          # Format (both shapes accepted):
          #   "extra": { "vuln-scan": { "no-widen": {
          #     "wpackagist-plugin/woocommerce": "License-tested only against 10.0.x"
          #   } } }
          # or:
          #   "extra": { "vuln-scan": { "no-widen": [
          #     "wpackagist-plugin/woocommerce"
          #   ] } }
          NO_WIDEN=$(jq -r '
            .extra["vuln-scan"]["no-widen"] // {} |
            if type == "array" then .[] else keys[] end
          ' composer.json 2>/dev/null | tr '\n' ' ')
          echo "No update within constraints, trying: composer require -W (filtered against extra.vuln-scan.no-widen)"

          # Precompute helpers for the require loop:
          #
          # 1. /tmp/composer-update-direct.txt — set of top-level requires
          #    (require + require-dev) from composer.json. We only ever run
          #    `composer require` against names in this set; otherwise a vuln
          #    in a transitive (e.g. symfony/http-foundation pulled in by
          #    another package) would get PROMOTED to a new top-level entry
          #    in composer.json. The right answer for a transitive is to
          #    widen the direct-dep ancestor(s) that pulled it in.
          #
          # 2. /tmp/composer-update-reverse.txt — reverse dependency map
          #    derived from composer.lock, one "child parent" pair per line.
          #    Used to BFS upward from a flagged transitive until we hit a
          #    direct dep.
          jq -r '((.require // {}) | keys) + ((.["require-dev"] // {}) | keys) | .[]' composer.json \
            | sort -u > /tmp/composer-update-direct.txt
          jq -r '
            ((.packages // []) + (."packages-dev" // []))[] as $p |
            ($p.require // {} | keys[]) as $child |
            "\($child) \($p.name)"
          ' composer.lock > /tmp/composer-update-reverse.txt

          # Expand the input package list into the set of direct deps we'll
          # actually widen. Transitives get replaced by their direct-dep
          # ancestor(s); multiple flagged packages converging on the same
          # ancestor are de-duped so we only widen each ancestor once.
          TARGETS=""
          for PACKAGE in ${{ inputs.packages }}; do
            if echo " $NO_WIDEN " | grep -qF " $PACKAGE "; then
              echo "  skip $PACKAGE — listed in extra.vuln-scan.no-widen"
              continue
            fi

            if grep -qFx "$PACKAGE" /tmp/composer-update-direct.txt; then
              TARGETS="$TARGETS $PACKAGE"
              continue
            fi

            # Transitive: BFS upward through the reverse map until we land on
            # direct-dep nodes. A transitive may be required by more than one
            # direct dep — widen all of them, since any one of them might be
            # the one capping the vulnerable version.
            seen="|"
            queue="$PACKAGE"
            ancestors=""
            while [ -n "$queue" ]; do
              current=$(echo "$queue" | head -1)
              queue=$(echo "$queue" | tail -n +2)
              case "$seen" in *"|$current|"*) continue ;; esac
              seen="$seen$current|"
              if grep -qFx "$current" /tmp/composer-update-direct.txt; then
                ancestors="$ancestors $current"
                continue
              fi
              parents=$(awk -v t="$current" '$1 == t {print $2}' /tmp/composer-update-reverse.txt)
              if [ -n "$parents" ]; then
                queue=$(printf '%s\n%s' "$queue" "$parents")
              fi
            done

            if [ -z "$ancestors" ]; then
              echo "::warning::no direct-dep ancestor found for transitive $PACKAGE — cannot widen"
              continue
            fi
            echo "  $PACKAGE is transitive — will widen ancestor(s):$ancestors"
            TARGETS="$TARGETS$ancestors"
          done

          # Dedupe.
          TARGETS=$(echo "$TARGETS" | tr ' ' '\n' | grep -v '^$' | sort -u | tr '\n' ' ')

          for PACKAGE in $TARGETS; do
            # Snapshot composer.json + composer.lock before each require so we
            # can roll back if composer resolves the package to a dev-* branch
            # constraint (e.g. dev-trunk). That happens on wpackagist plugins
            # when the project sets minimum-stability: dev and no released tag
            # outranks trunk — never a safe answer for a vuln scanner.
            cp composer.json /tmp/composer-update-pre-require.json
            cp composer.lock /tmp/composer-update-pre-require.lock

            # Preserve the require / require-dev placement. `composer require`
            # defaults to `require`; without `--dev` it will MOVE a package
            # that was originally in require-dev (e.g. phpunit/phpunit) into
            # require, which silently changes the prod dependency surface.
            REQUIRE_FLAGS="-W"
            if jq -e --arg p "$PACKAGE" '(.["require-dev"] // {})[$p]' composer.json >/dev/null; then
              REQUIRE_FLAGS="-W --dev"
            fi

            composer require $REQUIRE_FLAGS "$PACKAGE" --no-interaction --no-scripts 2>&1 || true

            NEW_CONSTRAINT=$(jq -r --arg p "$PACKAGE" '(.require // {})[$p] // (.["require-dev"] // {})[$p] // ""' composer.json)
            case "$NEW_CONSTRAINT" in
              dev-*)
                echo "::warning::composer require resolved $PACKAGE to '$NEW_CONSTRAINT' — reverting (dev branch constraints are not accepted)"
                cp /tmp/composer-update-pre-require.json composer.json
                cp /tmp/composer-update-pre-require.lock composer.lock
                ;;
            esac
          done

          if git diff --quiet composer.json composer.lock; then
            echo "No updates available"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Updated with constraint bump"
          echo "changed=true" >> "$GITHUB_OUTPUT"
        fi

        # Build a version-diff table from the before tempfile (saved above)
        # vs the post-update composer.lock.
        # from_entries requires {key, value} — it silently drops other field
        # names like `version`, producing a map of {pkg: null} regardless of
        # actual version. Map to {key, value} explicitly.
        JQ_VERSIONS='[(.packages + ."packages-dev")[] | {key: .name, value: .version}] | from_entries'
        jq "$JQ_VERSIONS" /tmp/composer-update-before.lock > /tmp/composer-update-before.json
        jq "$JQ_VERSIONS" composer.lock > /tmp/composer-update-after.json

        echo "Before snapshot: $(jq 'length' /tmp/composer-update-before.json) packages"
        echo "After snapshot:  $(jq 'length' /tmp/composer-update-after.json) packages"

        # Count packages with actual version changes (or added/removed).
        # If zero, the composer.lock diff is metadata-only (refreshed dist
        # references, content-hash) and doesn't actually fix any vulnerability
        # — skip PR creation rather than opening noise.
        VERSION_DIFF_COUNT=$(jq -r --slurpfile after /tmp/composer-update-after.json '
          ([to_entries[]
            | ($after[0][.key] // null) as $n
            | select($n != null and $n != .value)
          ] | length)
          + ([$after[0] | keys[]] - [keys[]] | length)
          + ([keys[]] - [$after[0] | keys[]] | length)
        ' /tmp/composer-update-before.json)

        echo "Version changes detected: $VERSION_DIFF_COUNT"

        if [ "$VERSION_DIFF_COUNT" -eq 0 ]; then
          echo "composer.lock changed but no package versions moved — skipping PR"
          echo "changed=false" >> "$GITHUB_OUTPUT"
          # Reset lock to avoid leaving metadata-only changes staged
          git checkout -- composer.json composer.lock 2>/dev/null || true
          exit 0
        fi

        {
          echo ""
          echo "## Version changes"
          echo ""
          echo "| Package | From | To |"
          echo "|---|---|---|"
          jq -r --slurpfile after /tmp/composer-update-after.json '
            to_entries[] as $b
            | ($after[0][$b.key] // null) as $n
            | select($n != null and $n != $b.value)
            | "| `\($b.key)` | `\($b.value)` | `\($n)` |"
          ' /tmp/composer-update-before.json | sort
          # New packages (present in after but not before)
          jq -r --slurpfile after /tmp/composer-update-after.json '
            [$after[0] | keys[]] - [keys[]] | .[]
          ' /tmp/composer-update-before.json | while read -r pkg; do
            [ -z "$pkg" ] && continue
            v=$(jq -r --arg k "$pkg" '.[$k]' /tmp/composer-update-after.json)
            echo "| \`$pkg\` | _(new)_ | \`$v\` |"
          done
          # Removed packages (present in before but not after)
          jq -r --slurpfile after /tmp/composer-update-after.json '
            [keys[]] - [$after[0] | keys[]] | .[]
          ' /tmp/composer-update-before.json | while read -r pkg; do
            [ -z "$pkg" ] && continue
            v=$(jq -r --arg k "$pkg" '.[$k]' /tmp/composer-update-before.json)
            echo "| \`$pkg\` | \`$v\` | _(removed)_ |"
          done
        } > /tmp/composer-update-versions.md

        echo "Version changes table:"
        cat /tmp/composer-update-versions.md

    - name: Create PR
      if: steps.check.outputs.skip != 'true' && steps.update.outputs.changed == 'true'
      id: create
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token || github.token }}
        PR_BODY: ${{ inputs.pr_body }}
        PACKAGES: ${{ inputs.packages }}
      run: |
        BRANCH="${{ inputs.branch_prefix }}-$(date +%Y%m%d-%H%M%S)"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # Remove actions/checkout's credential config — it sets includeIf
        # entries and extraheader with the GITHUB_TOKEN which overrides any
        # other auth method we try to use. Must be cleared before pushing.
        for key in $(git config --local --name-only --get-regexp '^includeIf\.gitdir:' 2>/dev/null); do
          git config --local --unset-all "$key" 2>/dev/null || true
        done
        git config --local --unset-all 'http.https://github.com/.extraheader' 2>/dev/null || true
        git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

        git checkout -b "$BRANCH"
        git add composer.json composer.lock

        # Commit message: title in subject, package list in body so `git blame`
        # on composer.lock answers "why did this version change?".
        {
          printf '%s\n\n' "${{ inputs.pr_title }}"
          echo "Updated packages:"
          for pkg in $PACKAGES; do
            echo "- $pkg"
          done
        } > /tmp/composer-update-commit.txt
        git commit -F /tmp/composer-update-commit.txt

        git push origin "$BRANCH"

        # Ensure the dedup label exists on the repo (idempotent — silently
        # no-ops if it already exists). Avoids needing per-repo setup.
        gh label create "${{ inputs.pr_label }}" \
          --color FFAA00 \
          --description "Auto-generated dependency update PR" \
          2>/dev/null || true

        # Use --body-file so backticks / $() / etc. in markdown stay literal.
        # Append the Version changes table built by the Update step (if any).
        {
          printf '%s' "$PR_BODY"
          if [ -s /tmp/composer-update-versions.md ]; then
            cat /tmp/composer-update-versions.md
          fi
        } > /tmp/composer-update-pr-body.md
        PR_URL=$(gh pr create \
          --title "${{ inputs.pr_title }}" \
          --label "${{ inputs.pr_label }}" \
          --body-file /tmp/composer-update-pr-body.md)
        echo "Created PR: $PR_URL"
        echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
