name: 'Composer Update Packages'
description: 'Update specific Composer packages and create a PR. Tries composer update first (within constraints), then composer require (bumps constraints) if needed.'

inputs:
  packages:
    required: true
    description: 'Space-separated list of Composer package names to update'
  token:
    required: false
    default: ''
    description: 'GitHub token with push + PR permissions. Defaults to github.token. Pass a GitHub App token for cross-repo write access.'
  pr_title:
    required: false
    default: 'Update packages'
    description: 'PR title'
  pr_body:
    required: false
    default: ''
    description: 'PR body (markdown)'
  pr_label:
    required: false
    default: 'dependencies'
    description: 'Label for the PR (used for dedup)'
  branch_prefix:
    required: false
    default: 'fix/update'
    description: 'Branch name prefix'

runs:
  using: 'composite'
  steps:
    - name: Check for existing PR (dedup)
      id: check
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token || github.token }}
        PR_BODY: ${{ inputs.pr_body }}
      run: |
        # Dedup by label. If an open PR with this label exists we skip creating
        # a duplicate. To avoid silently dropping NEW findings while a stale PR
        # sits open, we compare the marker in PR_BODY (e.g. `<!-- vuln-update-set:
        # foo,bar -->`) to the same marker in the open PR's body — if the package
        # set differs, post a comment so reviewers see the new findings.
        EXISTING=$(gh pr list --label "${{ inputs.pr_label }}" --state open --limit 1 --json number,body)
        EXISTING_NUM=$(echo "$EXISTING" | jq -r '.[0].number // empty')

        if [ -z "$EXISTING_NUM" ]; then
          echo "No open PR with label '${{ inputs.pr_label }}' — will create one"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "Open PR #$EXISTING_NUM with label '${{ inputs.pr_label }}' exists — checking if findings differ"
        EXISTING_BODY=$(echo "$EXISTING" | jq -r '.[0].body // ""')

        # Extract `<!-- ${LABEL}-set: a,b,c -->` marker from both bodies.
        # If markers match (or both empty), the findings are identical — skip silently.
        MARKER_KEY="${{ inputs.pr_label }}-set"
        EXISTING_SET=$(printf '%s' "$EXISTING_BODY" | grep -oE "$MARKER_KEY: [^ ]+ -->" | head -1 | sed -E "s/.*${MARKER_KEY}: ([^ ]+) -->.*/\1/")
        NEW_SET=$(printf '%s' "$PR_BODY" | grep -oE "$MARKER_KEY: [^ ]+ -->" | head -1 | sed -E "s/.*${MARKER_KEY}: ([^ ]+) -->.*/\1/")

        echo "Existing set: ${EXISTING_SET:-<none>}"
        echo "New set:      ${NEW_SET:-<none>}"

        if [ -n "$NEW_SET" ] && [ "$NEW_SET" = "$EXISTING_SET" ]; then
          echo "Findings unchanged since PR #$EXISTING_NUM was opened — skipping silently"
        else
          echo "Findings differ — posting comment to PR #$EXISTING_NUM"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            printf '## Updated findings — [run #%s](%s)\n\n' "${{ github.run_number }}" "$RUN_URL"
            printf '%s\n' "$PR_BODY"
          } > /tmp/composer-update-comment.md
          gh pr comment "$EXISTING_NUM" --body-file /tmp/composer-update-comment.md
        fi
        echo "skip=true" >> "$GITHUB_OUTPUT"

    - name: Update packages
      if: steps.check.outputs.skip != 'true'
      id: update
      shell: bash
      run: |
        # Step 1: Try composer update (stays within existing constraints).
        # `-W` (--with-all-dependencies) lets composer also update packages that
        # are LOCKED (not just those listed) when needed — required for cases
        # like roots/wordpress-no-content, which is pinned to the same version
        # as roots/wordpress; without -W neither can move.
        # Composite actions run with `set -e`, so capture the exit code via
        # `|| UPDATE_EXIT=$?` to keep the fallback alive on a non-zero exit.
        echo "Trying: composer update -W ${{ inputs.packages }}"
        UPDATE_EXIT=0
        composer update -W ${{ inputs.packages }} --no-interaction --no-scripts 2>&1 || UPDATE_EXIT=$?
        if [ "$UPDATE_EXIT" -ne 0 ]; then
          echo "::warning::composer update exited with code $UPDATE_EXIT, falling through to composer require"
        fi

        if ! git diff --quiet composer.json composer.lock; then
          echo "Updated within existing constraints"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Step 2: Constraints blocked the update — try composer require (bumps to latest).
        # Same `-W` reasoning applies: a vuln in a transitively-pinned package
        # needs the parent's lock to relax too.
        echo "No update within constraints, trying: composer require -W ${{ inputs.packages }}"
        for PACKAGE in ${{ inputs.packages }}; do
          composer require -W "$PACKAGE" --no-interaction --no-scripts 2>&1 || true
        done

        if git diff --quiet composer.json composer.lock; then
          echo "No updates available"
          echo "changed=false" >> "$GITHUB_OUTPUT"
        else
          echo "Updated with constraint bump"
          echo "changed=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Create PR
      if: steps.check.outputs.skip != 'true' && steps.update.outputs.changed == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token || github.token }}
        PR_BODY: ${{ inputs.pr_body }}
        PACKAGES: ${{ inputs.packages }}
      run: |
        BRANCH="${{ inputs.branch_prefix }}-$(date +%Y%m%d-%H%M%S)"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # Replace checkout-action's credentials with the app token. The checkout
        # action sets includeIf-based credential files — adding a second
        # extraheader causes "Duplicate header: Authorization". Using insteadOf
        # rewrites the URL to embed the token, bypassing header-based auth.
        git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

        git checkout -b "$BRANCH"
        git add composer.json composer.lock

        # Commit message: title in subject, package list in body so `git blame`
        # on composer.lock answers "why did this version change?".
        {
          printf '%s\n\n' "${{ inputs.pr_title }}"
          echo "Updated packages:"
          for pkg in $PACKAGES; do
            echo "- $pkg"
          done
        } > /tmp/composer-update-commit.txt
        git commit -F /tmp/composer-update-commit.txt

        git push origin "$BRANCH"

        # Ensure the dedup label exists on the repo (idempotent — silently
        # no-ops if it already exists). Avoids needing per-repo setup.
        gh label create "${{ inputs.pr_label }}" \
          --color FFAA00 \
          --description "Auto-generated dependency update PR" \
          2>/dev/null || true

        # Use --body-file so backticks / $() / etc. in markdown stay literal
        # (interpolating ${{ inputs.pr_body }} into a shell arg would re-parse them).
        printf '%s' "$PR_BODY" > /tmp/composer-update-pr-body.md
        gh pr create \
          --title "${{ inputs.pr_title }}" \
          --label "${{ inputs.pr_label }}" \
          --body-file /tmp/composer-update-pr-body.md
