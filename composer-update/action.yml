name: 'Composer Update Packages'
description: 'Update specific Composer packages and create a PR. Supports both composer update (lock only) and composer require (constraint bump).'

inputs:
  packages:
    required: false
    default: ''
    description: 'Space-separated package names for composer update (lock file only)'
  require_args:
    required: false
    default: ''
    description: 'Space-separated package:version args for composer require (bumps constraints)'
  pr_title:
    required: false
    default: 'Update packages'
    description: 'PR title'
  pr_body:
    required: false
    default: ''
    description: 'PR body (markdown)'
  pr_label:
    required: false
    default: 'dependencies'
    description: 'Label for the PR (used for dedup)'
  branch_prefix:
    required: false
    default: 'fix/update'
    description: 'Branch name prefix'

runs:
  using: 'composite'
  steps:
    - name: Check for existing PR
      id: check
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        EXISTING=$(gh pr list --label "${{ inputs.pr_label }}" --state open --limit 1 --json number -q '.[0].number')
        if [ -n "$EXISTING" ]; then
          echo "Open PR #$EXISTING with label '${{ inputs.pr_label }}' exists, skipping"
          echo "skip=true" >> "$GITHUB_OUTPUT"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Update packages
      if: steps.check.outputs.skip != 'true'
      id: update
      shell: bash
      run: |
        # Prefer composer require (bumps constraints to minimum fix version)
        # Fall back to composer update (only updates lock file within existing constraints)
        if [ -n "${{ inputs.require_args }}" ]; then
          echo "Running: composer require ${{ inputs.require_args }}"
          composer require ${{ inputs.require_args }} --no-interaction --no-scripts 2>&1 || {
            echo "composer require failed, falling back to composer update"
            if [ -n "${{ inputs.packages }}" ]; then
              composer update ${{ inputs.packages }} --no-interaction --no-scripts 2>&1 || true
            fi
          }
        elif [ -n "${{ inputs.packages }}" ]; then
          echo "Running: composer update ${{ inputs.packages }}"
          composer update ${{ inputs.packages }} --no-interaction --no-scripts 2>&1 || true
        else
          echo "No packages specified"
          echo "changed=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if git diff --quiet composer.json composer.lock; then
          echo "No updates available"
          echo "changed=false" >> "$GITHUB_OUTPUT"
        else
          echo "changed=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Create PR
      if: steps.check.outputs.skip != 'true' && steps.update.outputs.changed == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        BRANCH="${{ inputs.branch_prefix }}-$(date +%Y%m%d)"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git checkout -b "$BRANCH"
        git add composer.json composer.lock
        git commit -m "${{ inputs.pr_title }}"
        git push origin "$BRANCH"

        gh pr create \
          --title "${{ inputs.pr_title }}" \
          --label "${{ inputs.pr_label }}" \
          --body "${{ inputs.pr_body }}"
