name: 'SSH Agent'
description: 'Start SSH agent with pinned action SHA'

inputs:
  ssh-private-key:
    required: true

runs:
  using: 'composite'
  steps:
    - name: Start SSH agent
      uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387 # v0.9.0
      with:
        ssh-private-key: ${{ inputs.ssh-private-key }}
