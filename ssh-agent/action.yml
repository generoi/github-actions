name: 'SSH Agent'
description: 'Start SSH agent with pinned action SHA'

inputs:
  ssh-private-key:
    required: true

runs:
  using: 'composite'
  steps:
    - name: Start SSH agent
      uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
      with:
        ssh-private-key: ${{ inputs.ssh-private-key }}
