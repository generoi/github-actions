name: Claude Agent

on:
  workflow_call:
    inputs:
      model:
        type: string
        default: claude-opus-4-6
      mcp_config:
        type: string
        default: .claude/mcp-ci.json
    secrets:
      NPM_FONTAWESOME_AUTH_TOKEN:
        required: true
      PACKAGIST_GITHUB_TOKEN:
        required: true
      DB_ARTIFACT_KEY:
        required: true
      ANTHROPIC_API_KEY:
        required: true
      FIGMA_API_KEY:
        required: false

jobs:
  claude:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup project
        uses: generoi/github-actions/setup@v1
        with:
          npm_fontawesome_auth_token: ${{ secrets.NPM_FONTAWESOME_AUTH_TOKEN }}
          packagist_github_token: ${{ secrets.PACKAGIST_GITHUB_TOKEN }}

      - name: Install and build
        run: composer install:development

      - name: Setup DDEV
        uses: generoi/github-actions/setup-ddev@v1

      - name: Download database artifact
        uses: dawidd6/action-download-artifact@2536c51d3d126276eb39f74d6bc9c72ac6ef30d3 # v16
        with:
          workflow: sync-db.yml
          name: sanitized-db
          path: .github/fixtures/
          github_token: ${{ github.token }}

      - name: Decrypt and import database
        env:
          DB_ARTIFACT_KEY: ${{ secrets.DB_ARTIFACT_KEY }}
        run: |
          openssl enc -aes-256-cbc -pbkdf2 -d \
            -in .github/fixtures/sanitized-db.sql.gz.enc \
            -out .github/fixtures/sanitized-db.sql.gz \
            -pass env:DB_ARTIFACT_KEY
          ddev import-db --file=.github/fixtures/sanitized-db.sql.gz
          rm -f .github/fixtures/sanitized-db.sql.gz .github/fixtures/sanitized-db.sql.gz.enc

      - name: Optimize acorn
        run: ddev wp acorn optimize

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Parse max turns
        id: config
        env:
          BODY: ${{ github.event.issue.body || github.event.comment.body || '' }}
        run: |
          TURNS=$(echo "$BODY" | grep -oP 'max-turns:\s*\K\d+' || echo "30")
          echo "max_turns=$TURNS" >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@1fc90f3ed982521116d8ff6d85b948c9b12cae3e # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --model ${{ inputs.model }}
            --max-turns ${{ steps.config.outputs.max_turns }}
            --mcp-config ${{ inputs.mcp_config }}
            --allowedTools "*"
        env:
          FIGMA_API_KEY: ${{ secrets.FIGMA_API_KEY }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: claude-artifacts
          path: artifacts/
          if-no-files-found: ignore
